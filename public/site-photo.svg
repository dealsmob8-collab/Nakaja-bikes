  <text x="120" y="398" fill="#d6d6d6" font-family="Arial, Helvetica, sans-serif" font-size="30">One shared asset now controls the hero and social share image.</text>
  <text x="120" y="708" fill="#d6d6d6" font-family="Arial, Helvetica, sans-serif" font-size="24">Path: /public/site-photo.svg</text>

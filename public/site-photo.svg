  <desc id="desc">Single shared placeholder image to replace with the approved motorcycle campaign photo.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f0f0f" />
      <stop offset="100%" stop-color="#301010" />
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#d32f2f" />
      <stop offset="100%" stop-color="#ff8d8d" />
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)" />
  <circle cx="208" cy="610" r="102" fill="none" stroke="#f4f4f4" stroke-opacity=".22" stroke-width="26" />
  <circle cx="866" cy="610" r="102" fill="none" stroke="#f4f4f4" stroke-opacity=".22" stroke-width="26" />
